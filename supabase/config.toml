name = "ai-language-coach"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.google]
enabled = true
client_id = ""
secret = ""
redirect_uri = "http://localhost:54321/auth/v1/callback"

[auth.apple]
enabled = false
client_id = ""
secret = ""
redirect_uri = "http://localhost:54321/auth/v1/callback"

[auth.microsoft]
enabled = false
client_id = ""
secret = ""
redirect_uri = "http://localhost:54321/auth/v1/callback"

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.avatars]
enabled = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp"]
public = true

[storage.buckets.voice-recordings]
enabled = true
file_size_limit = "25MiB"
allowed_mime_types = ["audio/wav", "audio/mp3", "audio/webm", "audio/ogg"]
public = false

[storage.buckets.lesson-images]
enabled = true
file_size_limit = "10MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp"]
public = true

[storage.buckets.exam-assets]
enabled = true
file_size_limit = "20MiB"
allowed_mime_types = ["image/png", "image/jpeg", "audio/wav", "audio/mp3"]
public = false

[storage.buckets.certificates]
enabled = true
file_size_limit = "5MiB"
allowed_mime_types = ["application/pdf", "image/png"]
public = false

[storage.buckets.exports]
enabled = true
file_size_limit = "50MiB"
allowed_mime_types = ["application/json", "text/csv", "application/pdf"]
public = false

[storage.buckets.temporary]
enabled = true
file_size_limit = "100MiB"
allowed_mime_types = ["*"]
public = false

[realtime]
enabled = true
max_connections = 200
flipbook_interval = 1

[functions]
verify_jwt = true

[functions.ai-chat]
verify_jwt = true

[functions.ai-tutor]
verify_jwt = true

[functions.writing-evaluate]
verify_jwt = true

[functions.speaking-evaluate]
verify_jwt = true

[functions.grammar-check]
verify_jwt = true

[functions.exam]
verify_jwt = true

[functions.analytics]
verify_jwt = true

[functions.notifications]
verify_jwt = true

[functions.subscription]
verify_jwt = true

[functions.dashboard]
verify_jwt = true

[functions.user-profile]
verify_jwt = true

[functions.vocabulary]
verify_jwt = true

[functions.lessons]
verify_jwt = true

[functions.files]
verify_jwt = true

[functions.admin]
verify_jwt = true
