<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Language Coach — Admin Control Center. Manage users, revenue, AI costs, tutors and platform settings.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Open Graph -->
  <meta property="og:title" content="AI Coach Admin Panel">
  <meta property="og:description" content="Executive control center for AI Language Coach platform.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI Coach Admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AI Coach — Admin Panel</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash screen while Flutter initializes */
    body {
      margin: 0;
      background-color: #0b1220;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading {
      text-align: center;
      color: #94a3b8;
    }
    #loading .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    #loading p {
      font-size: 14px;
      letter-spacing: 0.5px;
      margin-top: 12px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">⚡</div>
    <p>AI Coach Admin</p>
    <div class="spinner"></div>
  </div>

  <script>
    // Hide splash once Flutter is ready
    window.addEventListener('flutter-first-frame', () => {
      const el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
