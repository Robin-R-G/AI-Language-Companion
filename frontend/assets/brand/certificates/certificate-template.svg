<svg xmlns="http://www.w3.org/2000/svg" width="1123" height="794" viewBox="0 0 1123 794">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <pattern id="subtlePattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#2563EB" opacity="0.05"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  <rect width="100%" height="100%" fill="url(#subtlePattern)"/>
  
  <!-- Outer Border -->
  <rect x="10" y="10" width="1103" height="774" rx="8" fill="none" stroke="url(#borderGradient)" stroke-width="4"/>
  
  <!-- Gold Accent Line -->
  <rect x="20" y="20" width="1083" height="754" rx="4" fill="none" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- Decorative Corner Elements -->
  <path d="M30,30 L80,30 L80,35 L35,35 L35,80 L30,80 Z" fill="#2563EB"/>
  <path d="M1093,30 L1043,30 L1043,35 L1088,35 L1088,80 L1093,80 Z" fill="#2563EB"/>
  <path d="M30,764 L80,764 L80,759 L35,759 L35,714 L30,714 Z" fill="#2563EB"/>
  <path d="M1093,764 L1043,764 L1043,759 L1088,759 L1088,714 L1093,714 Z" fill="#2563EB"/>
  
  <!-- Header Section -->
  <g transform="translate(561, 80)">
    <!-- Logo Space Placeholder -->
    <rect x="-25" y="-25" width="50" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">LOGO</text>
    
    <!-- AI Language Coach Header -->
    <text x="0" y="50" font-family="Georgia, serif" font-size="28" fill="#2563EB" text-anchor="middle" font-weight="bold">AI Language Coach</text>
    <text x="0" y="70" font-family="Arial, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Mastering Communication Through AI</text>
  </g>
  
  <!-- Certificate Title -->
  <g transform="translate(561, 200)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="42" fill="#1E293B" text-anchor="middle" font-weight="bold">Certificate of Completion</text>
    <line x1="-180" y1="15" x2="180" y2="15" stroke="url(#goldGradient)" stroke-width="2"/>
  </g>
  
  <!-- Certificate Body -->
  <g transform="translate(561, 280)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">This is to certify that</text>
    
    <!-- Student Name Placeholder -->
    <rect x="-200" y="25" width="400" height="50" rx="4" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="0" y="55" font-family="Georgia, serif" font-size="24" fill="#1E293B" text-anchor="middle" font-weight="bold">[Student Name]</text>
    
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="16" fill="#475569" text-anchor="middle">has successfully completed</text>
    
    <!-- Course Name Placeholder -->
    <rect x="-250" y="115" width="500" height="40" rx="4" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="0" y="140" font-family="Arial, sans-serif" font-size="18" fill="#2563EB" text-anchor="middle" font-weight="bold">[Course/Exam Name]</text>
    
    <text x="0" y="180" font-family="Arial, sans-serif" font-size="14" fill="#64748B" text-anchor="middle">demonstrating proficiency in language skills and AI-assisted learning</text>
  </g>
  
  <!-- Date and Signature Section -->
  <g transform="translate(0, 500)">
    <!-- Date -->
    <g transform="translate(300, 0)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#475569" text-anchor="middle">Date of Completion</text>
      <rect x="-100" y="10" width="200" height="30" rx="4" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,5"/>
      <text x="0" y="30" font-family="Arial, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">[MM/DD/YYYY]</text>
      <line x1="-80" y1="45" x2="80" y2="45" stroke="#CBD5E1" stroke-width="1"/>
    </g>
    
    <!-- Signature 1 -->
    <g transform="translate(561, 0)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#475569" text-anchor="middle">AI Language Coach</text>
      <line x1="-80" y1="10" x2="80" y2="10" stroke="#CBD5E1" stroke-width="1"/>
      <text x="0" y="30" font-family="Arial, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">[Instructor Name]</text>
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Lead Instructor</text>
    </g>
    
    <!-- Signature 2 -->
    <g transform="translate(822, 0)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#475569" text-anchor="middle">Program Director</text>
      <line x1="-80" y1="10" x2="80" y2="10" stroke="#CBD5E1" stroke-width="1"/>
      <text x="0" y="30" font-family="Arial, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">[Director Name]</text>
      <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Program Director</text>
    </g>
  </g>
  
  <!-- QR Code Verification Area -->
  <g transform="translate(1000, 650)">
    <rect x="-40" y="-40" width="80" height="80" rx="4" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="-35" y="-35" width="70" height="70" rx="2" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="0" y="-10" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">QR CODE</text>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">VERIFICATION</text>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="6" fill="#CBD5E1" text-anchor="middle">[PLACEHOLDER]</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Scan to verify</text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(561, 750)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Certificate ID: [UNIQUE-ID] | Issued by AI Language Coach Platform</text>
  </g>
</svg>