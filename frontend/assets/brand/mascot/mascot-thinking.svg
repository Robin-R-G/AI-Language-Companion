<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Body/Head -->
  <circle cx="60" cy="62" r="38" fill="url(#bodyGrad)"/>
  <!-- Headphones band -->
  <path d="M28 52 Q60 18 92 52" fill="none" stroke="#7C3AED" stroke-width="5" stroke-linecap="round"/>
  <!-- Left headphone cup -->
  <ellipse cx="28" cy="54" rx="8" ry="10" fill="#7C3AED"/>
  <!-- Right headphone cup -->
  <ellipse cx="92" cy="54" rx="8" ry="10" fill="#7C3AED"/>
  <!-- Left eye -->
  <circle cx="46" cy="58" r="4" fill="#1E293B"/>
  <!-- Right eye -->
  <circle cx="74" cy="58" r="4" fill="#1E293B"/>
  <!-- Eye shine -->
  <circle cx="48" cy="56" r="1.5" fill="#fff"/>
  <circle cx="76" cy="56" r="1.5" fill="#fff"/>
  <!-- Neutral mouth -->
  <path d="M50 74 Q60 78 70 74" fill="none" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
  <!-- Hand on chin -->
  <path d="M40 78 Q38 88 44 92" fill="none" stroke="url(#bodyGrad)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="44" cy="93" r="5" fill="#2563EB"/>
  <!-- Thought bubble -->
  <circle cx="98" cy="36" r="4" fill="#E2E8F0" opacity="0.8"/>
  <circle cx="106" cy="28" r="3" fill="#E2E8F0" opacity="0.6"/>
  <ellipse cx="102" cy="18" rx="14" ry="10" fill="#E2E8F0" opacity="0.9"/>
  <!-- Dots in thought bubble -->
  <circle cx="96" cy="18" r="2" fill="#7C3AED"/>
  <circle cx="102" cy="18" r="2" fill="#7C3AED"/>
  <circle cx="108" cy="18" r="2" fill="#7C3AED"/>
</svg>
