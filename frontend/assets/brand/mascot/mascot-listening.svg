<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Body/Head -->
  <circle cx="60" cy="62" r="38" fill="url(#bodyGrad)"/>
  <!-- Headphones band -->
  <path d="M28 52 Q60 18 92 52" fill="none" stroke="#7C3AED" stroke-width="5" stroke-linecap="round"/>
  <!-- Left headphone cup -->
  <ellipse cx="28" cy="54" rx="8" ry="10" fill="#7C3AED"/>
  <!-- Right headphone cup -->
  <ellipse cx="92" cy="54" rx="8" ry="10" fill="#7C3AED"/>
  <!-- Left eye -->
  <circle cx="46" cy="58" r="4" fill="#1E293B"/>
  <!-- Right eye -->
  <circle cx="74" cy="58" r="4" fill="#1E293B"/>
  <!-- Eye shine -->
  <circle cx="48" cy="56" r="1.5" fill="#fff"/>
  <circle cx="76" cy="56" r="1.5" fill="#fff"/>
  <!-- Attentive mouth -->
  <ellipse cx="60" cy="76" rx="4" ry="3" fill="#1E293B"/>
  <!-- Hand cupped to ear -->
  <path d="M92 66 Q104 58 108 48" fill="none" stroke="url(#bodyGrad)" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="108" cy="46" rx="5" ry="7" fill="#2563EB"/>
  <!-- Sound wave lines -->
  <path d="M116 40 Q122 46 116 52" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M120 36 Q128 46 120 56" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M124 32 Q134 46 124 60" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
