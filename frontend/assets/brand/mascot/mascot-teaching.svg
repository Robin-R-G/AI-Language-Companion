<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Body/Head -->
  <circle cx="60" cy="62" r="38" fill="url(#bodyGrad)"/>
  <!-- Headphones band -->
  <path d="M28 52 Q60 18 92 52" fill="none" stroke="#7C3AED" stroke-width="5" stroke-linecap="round"/>
  <!-- Left headphone cup -->
  <ellipse cx="28" cy="54" rx="8" ry="10" fill="#7C3AED"/>
  <!-- Right headphone cup -->
  <ellipse cx="92" cy="54" rx="8" ry="10" fill="#7C3AED"/>
  <!-- Left eye -->
  <circle cx="46" cy="58" r="4" fill="#1E293B"/>
  <!-- Right eye -->
  <circle cx="74" cy="58" r="4" fill="#1E293B"/>
  <!-- Eye shine -->
  <circle cx="48" cy="56" r="1.5" fill="#fff"/>
  <circle cx="76" cy="56" r="1.5" fill="#fff"/>
  <!-- Friendly smile -->
  <path d="M48 72 Q60 82 72 72" fill="none" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
  <!-- Book/board -->
  <rect x="88" y="76" width="24" height="18" rx="3" fill="#06B6D4" opacity="0.9"/>
  <line x1="92" y1="82" x2="108" y2="82" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="87" x2="104" y2="87" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="92" x2="100" y2="92" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Pointing arm -->
  <path d="M88 72 Q96 68 100 76" fill="none" stroke="url(#bodyGrad)" stroke-width="6" stroke-linecap="round"/>
</svg>
