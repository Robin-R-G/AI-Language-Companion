<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="o2bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#ECFEFF"/>
    </linearGradient>
    <linearGradient id="o2primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#o2bg)"/>
  
  <!-- Voice wave lines -->
  <g transform="translate(60, 120)" opacity="0.3">
    <path d="M0 50 Q30 20, 60 50 Q90 80, 120 50 Q150 20, 180 50 Q210 80, 240 50 Q270 20, 300 50" stroke="#2563EB" stroke-width="3" fill="none"/>
    <path d="M0 80 Q30 50, 60 80 Q90 110, 120 80 Q150 50, 180 80 Q210 110, 240 80 Q270 50, 300 80" stroke="#7C3AED" stroke-width="3" fill="none"/>
    <path d="M0 110 Q30 80, 60 110 Q90 140, 120 110 Q150 80, 180 110 Q210 140, 240 110 Q270 80, 300 110" stroke="#06B6D4" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Microphone icon -->
  <g transform="translate(170, 60)">
    <rect x="20" y="10" width="40" height="60" rx="20" fill="url(#o2primary)"/>
    <path d="M10 50 Q40 80, 70 50" stroke="url(#o2primary)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <line x1="40" y1="75" x2="40" y2="95" stroke="url(#o2primary)" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Two people speaking -->
  <g transform="translate(80, 200)">
    <!-- Person 1 -->
    <circle cx="40" cy="30" r="25" fill="#FBBF24"/>
    <circle cx="40" cy="28" r="18" fill="#FEF3C7"/>
    <circle cx="34" cy="26" r="2.5" fill="#1E293B"/>
    <circle cx="46" cy="26" r="2.5" fill="#1E293B"/>
    <path d="M34 34 Q40 39, 46 34" stroke="#1E293B" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="25" y="55" width="30" height="35" rx="8" fill="#2563EB"/>
    <!-- Speech lines -->
    <line x1="65" y1="30" x2="90" y2="30" stroke="#2563EB" stroke-width="2" opacity="0.5"/>
    <line x1="65" y1="38" x2="85" y2="38" stroke="#2563EB" stroke-width="2" opacity="0.3"/>
  </g>
  
  <g transform="translate(220, 200)">
    <!-- Person 2 -->
    <circle cx="40" cy="30" r="25" fill="#A78BFA"/>
    <circle cx="40" cy="28" r="18" fill="#EDE9FE"/>
    <circle cx="34" cy="26" r="2.5" fill="#1E293B"/>
    <circle cx="46" cy="26" r="2.5" fill="#1E293B"/>
    <path d="M34 34 Q40 39, 46 34" stroke="#1E293B" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="25" y="55" width="30" height="35" rx="8" fill="#7C3AED"/>
    <!-- Speech lines -->
    <line x1="10" y1="30" x2="-15" y2="30" stroke="#7C3AED" stroke-width="2" opacity="0.5"/>
    <line x1="10" y1="38" x2="-5" y2="38" stroke="#7C3AED" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Connection arrow -->
  <path d="M170 240 Q200 220, 230 240" stroke="#06B6D4" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  
  <!-- Text -->
  <text x="200" y="330" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0F172A" text-anchor="middle">Voice Conversations</text>
  <text x="200" y="355" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#64748B" text-anchor="middle">Practice speaking with your AI tutor</text>
  <text x="200" y="372" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#64748B" text-anchor="middle">in real-time conversations</text>
</svg>