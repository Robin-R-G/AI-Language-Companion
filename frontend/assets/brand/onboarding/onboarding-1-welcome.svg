<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="o1bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
    <linearGradient id="o1primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#o1bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="60" cy="60" r="80" fill="#2563EB" opacity="0.05"/>
  <circle cx="340" cy="340" r="60" fill="#7C3AED" opacity="0.05"/>
  
  <!-- AI Assistant character -->
  <g transform="translate(150, 80)">
    <!-- Body -->
    <circle cx="50" cy="50" r="45" fill="url(#o1primary)"/>
    <!-- Face -->
    <circle cx="50" cy="42" r="28" fill="white"/>
    <!-- Eyes - friendly -->
    <circle cx="38" cy="40" r="4" fill="#1E293B"/>
    <circle cx="62" cy="40" r="4" fill="#1E293B"/>
    <circle cx="39" cy="39" r="1.5" fill="white"/>
    <circle cx="63" cy="39" r="1.5" fill="white"/>
    <!-- Smile -->
    <path d="M38 50 Q50 60, 62 50" stroke="#1E293B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Wave hand -->
    <path d="M85 30 Q95 15, 100 25" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="100" cy="22" r="5" fill="#FBBF24"/>
  </g>
  
  <!-- Welcome text area -->
  <text x="200" y="260" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#0F172A" text-anchor="middle">Welcome!</text>
  <text x="200" y="290" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#64748B" text-anchor="middle">Your personal AI language coach</text>
  <text x="200" y="310" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#64748B" text-anchor="middle">is ready to help you learn</text>
  
  <!-- Language bubbles -->
  <g opacity="0.8">
    <rect x="50" y="340" width="50" height="28" rx="14" fill="#2563EB" opacity="0.15"/>
    <text x="75" y="358" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#2563EB" text-anchor="middle">EN</text>
    <rect x="110" y="340" width="50" height="28" rx="14" fill="#7C3AED" opacity="0.15"/>
    <text x="135" y="358" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#7C3AED" text-anchor="middle">DE</text>
    <rect x="170" y="340" width="50" height="28" rx="14" fill="#06B6D4" opacity="0.15"/>
    <text x="195" y="358" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#06B6D4" text-anchor="middle">JA</text>
    <rect x="230" y="340" width="50" height="28" rx="14" fill="#22C55E" opacity="0.15"/>
    <text x="255" y="358" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#22C55E" text-anchor="middle">FR</text>
    <rect x="290" y="340" width="50" height="28" rx="14" fill="#F59E0B" opacity="0.15"/>
    <text x="315" y="358" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#F59E0B" text-anchor="middle">ES</text>
  </g>
</svg>