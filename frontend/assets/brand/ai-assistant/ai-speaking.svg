<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="aiGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  
  <!-- Speaking glow -->
  <circle cx="60" cy="60" r="58" fill="#2563EB" opacity="0.08"/>
  <circle cx="60" cy="60" r="55" fill="url(#aiGrad5)"/>
  
  <circle cx="60" cy="52" r="35" fill="white"/>
  
  <!-- Eyes - focused -->
  <circle cx="48" cy="48" r="5" fill="#1E293B"/>
  <circle cx="72" cy="48" r="5" fill="#1E293B"/>
  <circle cx="49.5" cy="46.5" r="2" fill="white"/>
  <circle cx="73.5" cy="46.5" r="2" fill="white"/>
  
  <!-- Open mouth (speaking) -->
  <ellipse cx="60" cy="63" rx="8" ry="6" fill="#1E293B"/>
  <ellipse cx="60" cy="62" rx="6" ry="3" fill="#EF4444" opacity="0.3"/>
  
  <!-- Sound waves from mouth -->
  <path d="M75 58 Q82 52, 89 58" stroke="#2563EB" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M78 64 Q85 58, 92 64" stroke="#2563EB" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M81 70 Q88 64, 95 70" stroke="#2563EB" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Headphones -->
  <path d="M28 45 Q28 20, 60 18 Q92 20, 92 45" stroke="#7C3AED" stroke-width="5" fill="none" stroke-linecap="round"/>
  <rect x="22" y="40" width="12" height="18" rx="6" fill="#7C3AED"/>
  <rect x="86" y="40" width="12" height="18" rx="6" fill="#7C3AED"/>
</svg>