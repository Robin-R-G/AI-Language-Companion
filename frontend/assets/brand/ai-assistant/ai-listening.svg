  <!-- Sound wave indicators -->
  <path d="M10 60 Q15 50, 20 60 Q25 70, 30 60" stroke="#22C55E" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M90 60 Q95 50, 100 60 Q105 70, 110 60" stroke="#22C55E" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Headphones -->
