      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  
  <!-- Pulse rings -->
  <circle cx="60" cy="60" r="58" fill="url(#aiGrad4)" opacity="0.1"/>
  <circle cx="60" cy="60" r="55" fill="url(#aiGrad4)"/>
  
  <circle cx="60" cy="52" r="35" fill="white"/>
  
  <!-- Eyes - listening (attentive) -->
  <circle cx="48" cy="48" r="5" fill="#1E293B"/>
  <circle cx="72" cy="48" r="5" fill="#1E293B"/>
  <circle cx="49.5" cy="46.5" r="2" fill="white"/>
  <circle cx="73.5" cy="46.5" r="2" fill="white"/>
  
  <!-- Slight smile -->
