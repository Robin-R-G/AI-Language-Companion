<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <linearGradient id="es6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <circle cx="120" cy="100" r="70" fill="url(#es6)"/>
  <!-- Chart area -->
  <rect x="70" y="60" width="100" height="80" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Grid lines -->
  <line x1="85" y1="80" x2="155" y2="80" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="85" y1="95" x2="155" y2="95" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="85" y1="110" x2="155" y2="110" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="85" y1="125" x2="155" y2="125" stroke="#F1F5F9" stroke-width="1"/>
  <!-- Flat line (no data) -->
  <line x1="90" y1="120" x2="150" y2="120" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Question mark -->
  <text x="120" y="108" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#CBD5E1" text-anchor="middle">?</text>
  <text x="120" y="175" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#64748B" text-anchor="middle">Complete lessons to see progress</text>
</svg>