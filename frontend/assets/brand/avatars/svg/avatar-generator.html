<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Generator - AI Language Companion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
  h1 { text-align: center; margin-bottom: 8px; font-size: 1.8rem; }
  p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 24px; }
  .controls { text-align: center; margin-bottom: 24px; }
  .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; max-width: 1400px; margin: 0 auto; }
  .avatar-cell { text-align: center; }
  .avatar-cell svg { width: 120px; height: 120px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .avatar-cell span { display: block; font-size: 0.7rem; color: #64748b; margin-top: 4px; }
</style>
</head>
<body>
<h1>Avatar Generator</h1>
<p class="subtitle">120 diverse avatars for AI Language Companion</p>
<div class="controls">
  <button class="btn btn-primary" onclick="downloadAll()">Download All 120 SVGs</button>
</div>
<div class="grid" id="grid"></div>
<script>
const BRAND = { blue: '#2563EB', purple: '#7C3AED', teal: '#06B6D4', green: '#22C55E', orange: '#F59E0B' };
const BG_COLORS = ['#1e3a5f','#2d1b4e','#1a3c3c','#1e3a2a','#3d2e1a','#1a2e4e','#2e1a3e','#1a3e3a','#2a3a1a','#3a2a1a','#1a2a3e','#2e3a1a'];

const SKIN = { light: ['#FDDBB4','#F5C99A','#F2D1B0','#FADEC9'], medium: ['#D4A574','#C69C6D','#D2A679','#C4935A'], dark: ['#8D5524','#7A4B2F','#9C6B3C','#6B3F1D'] };
const HAIR_COLORS = { light: ['#3B2314','#2C1A0E','#1A1A1A','#4A3728'], medium: ['#1A1A1A','#2C1A0E','#3B2314','#D4A040','#8B4513'], dark: ['#1A1A1A','#2C1A0E','#0A0A0A','#3B2314'] };
const EYE_COLORS = ['#3B2314','#2C6E4F','#4A90D9','#6B4F8A'];
const BG_ACCENTS = [BRAND.blue, BRAND.purple, BRAND.teal, BRAND.green, BRAND.orange, '#EC4899', '#8B5CF6', '#14B8A6', '#EF4444', '#6366F1'];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rand(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

function makeBackground(i) {
  const bg = pick(BG_ACCENTS);
  return `<rect width="120" height="120" fill="${bg}" opacity="0.15"/>
          <circle cx="60" cy="60" r="58" fill="${bg}" opacity="0.08"/>`;
}

function makeNeck(skin) {
  return `<rect x="48" y="78" width="24" height="16" rx="4" fill="${skin}"/>`;
}

function makeHead(skin) {
  return `<ellipse cx="60" cy="52" rx="30" ry="32" fill="${skin}"/>`;
}

function makeEyes(type) {
  if (type === 'narrow') {
    return `<ellipse cx="48" cy="52" rx="4" ry="2.5" fill="white"/>
            <ellipse cx="72" cy="52" rx="4" ry="2.5" fill="white"/>
            <circle cx="48" cy="52" r="2" fill="#2C1A0E"/>
            <circle cx="72" cy="52" r="2" fill="#2C1A0E"/>`;
  }
  return `<ellipse cx="48" cy="52" rx="4" ry="3.5" fill="white"/>
          <ellipse cx="72" cy="52" rx="4" ry="3.5" fill="white"/>
          <circle cx="48" cy="52" r="2.5" fill="#2C1A0E"/>
          <circle cx="72" cy="52" r="2.5" fill="#2C1A0E"/>
          <circle cx="49" cy="51" r="0.8" fill="white"/>
          <circle cx="73" cy="51" r="0.8" fill="white"/>`;
}

function makeEyebrows(type) {
  if (type === 'thin') {
    return `<line x1="42" y1="45" x2="54" y2="44" stroke="#2C1A0E" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="66" y1="44" x2="78" y2="45" stroke="#2C1A0E" stroke-width="1.5" stroke-linecap="round"/>`;
  }
  return `<line x1="42" y1="44" x2="54" y2="43" stroke="#2C1A0E" stroke-width="2" stroke-linecap="round"/>
          <line x1="66" y1="43" x2="78" y2="44" stroke="#2C1A0E" stroke-width="2" stroke-linecap="round"/>`;
}

function makeMouth(type) {
  if (type === 'smile') return `<path d="M50 64 Q60 72 70 64" stroke="#B4564A" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  if (type === 'grin') return `<path d="M48 64 Q60 74 72 64" stroke="#B4564A" stroke-width="2" fill="none" stroke-linecap="round"/>
                               <path d="M52 64 Q60 69 68 64" fill="white" opacity="0.5"/>`;
  return `<line x1="50" y1="65" x2="70" y2="65" stroke="#B4564A" stroke-width="2" stroke-linecap="round"/>`;
}

function makeNose(type) {
  if (type === 'button') return `<ellipse cx="60" cy="58" rx="2.5" ry="2" fill="${'#E0B890'}" opacity="0.6"/>`;
  return `<path d="M60 55 Q58 59 56 58" stroke="#C4935A" stroke-width="1" fill="none" opacity="0.5"/>`;
}

const HAIR_STYLE = {
  short: (color) => `<path d="M30 42 Q30 18 60 16 Q90 18 90 42 Q88 34 75 30 Q60 28 45 30 Q32 34 30 42Z" fill="${color}"/>`,
  long: (color) => `<path d="M30 42 Q30 18 60 16 Q90 18 90 42 Q88 34 75 30 Q60 28 45 30 Q32 34 30 42Z" fill="${color}"/>
                    <path d="M30 42 Q28 60 26 78 Q28 82 32 80 L32 50Z" fill="${color}"/>
                    <path d="M90 42 Q92 60 94 78 Q92 82 88 80 L88 50Z" fill="${color}"/>`,
  curly: (color) => `<circle cx="38" cy="34" r="10" fill="${color}"/><circle cx="52" cy="28" r="11" fill="${color}"/>
                     <circle cx="68" cy="28" r="11" fill="${color}"/><circle cx="82" cy="34" r="10" fill="${color}"/>
                     <circle cx="34" cy="44" r="8" fill="${color}"/><circle cx="86" cy="44" r="8" fill="${color}"/>`,
  bob: (color) => `<path d="M28 42 Q28 16 60 14 Q92 16 92 42 Q90 52 88 60 L32 60 Q30 52 28 42Z" fill="${color}"/>`,
  braids: (color) => `<path d="M30 42 Q30 18 60 16 Q90 18 90 42 Q88 34 75 30 Q60 28 45 30 Q32 34 30 42Z" fill="${color}"/>
                      <path d="M32 46 L28 70 Q26 76 30 78 L34 78 Q36 74 34 70 L36 46Z" fill="${color}"/>
                      <path d="M88 46 L92 70 Q94 76 90 78 L86 78 Q84 74 86 70 L84 46Z" fill="${color}"/>`,
  ponytail: (color) => `<path d="M30 42 Q30 18 60 16 Q90 18 90 42 Q88 34 75 30 Q60 28 45 30 Q32 34 30 42Z" fill="${color}"/>
                        <ellipse cx="78" cy="30" rx="12" ry="8" fill="${color}" transform="rotate(-20 78 30)"/>
                        <path d="M82 26 Q88 20 94 30 Q98 44 90 56 Q86 48 88 38 Q86 28 82 26Z" fill="${color}"/>`,
  buzz: (color) => `<path d="M32 40 Q32 20 60 18 Q88 20 88 40 Q86 32 72 30 Q60 28 48 30 Q34 32 32 40Z" fill="${color}" opacity="0.85"/>`,
  afro: (color) => `<circle cx="60" cy="36" r="32" fill="${color}"/>
                    <ellipse cx="60" cy="52" rx="30" ry="12" fill="${color}"/>`,
  red: (color) => `<path d="M30 42 Q30 18 60 16 Q90 18 90 42 Q88 34 75 30 Q60 28 45 30 Q32 34 30 42Z" fill="${color}"/>
                   <path d="M30 42 Q28 56 30 64 L32 64 Q32 54 32 46Z" fill="${color}"/>
                   <path d="M90 42 Q92 56 90 64 L88 64 Q88 54 88 46Z" fill="${color}"/>`,
  headband: (color) => `<path d="M30 42 Q30 18 60 16 Q90 18 90 42 Q88 34 75 30 Q60 28 45 30 Q32 34 30 42Z" fill="${color}"/>
                        <path d="M30 40 Q60 34 90 40" stroke="${pick(BRAND_COLORS)}" stroke-width="4" fill="none"/>`
};

const BRAND_COLORS = [BRAND.blue, BRAND.purple, BRAND.teal, BRAND.green, BRAND.orange];

function generateAvatar(i) {
  const skinTone = pick([...SKIN.light, ...SKIN.medium, ...SKIN.dark]);
  const isLight = SKIN.light.includes(skinTone);
  const isDark = SKIN.dark.includes(skinTone);
  const hairColor = isLight ? pick(HAIR_COLORS.light) : isDark ? pick(HAIR_COLORS.dark) : pick(HAIR_COLORS.medium);
  const eyeType = Math.random() > 0.7 ? 'narrow' : 'normal';
  const browType = Math.random() > 0.5 ? 'thin' : 'normal';
  const mouthType = pick(['smile', 'smile', 'grin', 'neutral']);
  const noseType = Math.random() > 0.5 ? 'button' : 'bridge';
  const hairStyle = pick(Object.keys(HAIR_STYLE));
  const hairSvg = HAIR_STYLE[hairStyle](hairColor);

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs><clipPath id="c${i}"><circle cx="60" cy="60" r="60"/></clipPath></defs>
  <g clip-path="url(#c${i})">
    <rect width="120" height="120" fill="${pick(BG_ACCENTS)}" opacity="0.12"/>
    ${makeNeck(skinTone)}
    ${makeHead(skinTone)}
    ${hairSvg}
    ${makeEyes(eyeType)}
    ${makeEyebrows(browType)}
    ${makeNose(noseType)}
    ${makeMouth(mouthType)}
  </g>
</svg>`;
}

function render() {
  const grid = document.getElementById('grid');
  for (let i = 1; i <= 120; i++) {
    const svg = generateAvatar(i);
    const div = document.createElement('div');
    div.className = 'avatar-cell';
    div.innerHTML = svg + `<span>avatar-${String(i).padStart(3,'0')}</span>`;
    grid.appendChild(div);
  }
}

function downloadAll() {
  for (let i = 1; i <= 120; i++) {
    const svg = generateAvatar(i);
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `avatar-${String(i).padStart(3,'0')}.svg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
}

render();
</script>
</body>
</html>
