<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="instagramGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#instagramGradient)"/>
  
  <!-- Decorative Circles -->
  <circle cx="200" cy="200" r="300" fill="url(#circleGradient)"/>
  <circle cx="880" cy="880" r="400" fill="url(#circleGradient)"/>
  <circle cx="540" cy="540" r="200" fill="#FFFFFF" opacity="0.05"/>
  
  <!-- Main Content Card -->
  <rect x="100" y="100" width="880" height="880" rx="30" fill="#FFFFFF" opacity="0.1" stroke="#FFFFFF" stroke-width="2" opacity="0.2"/>
  
  <!-- AI Brain Icon -->
  <g transform="translate(540, 300)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="80" fill="#FFFFFF" opacity="0.9"/>
    <path d="M-30,-20 C-40,-10 -40,10 -30,20 C-20,30 0,35 20,30 C30,25 35,15 35,0 C35,-15 30,-25 20,-30 C10,-35 -10,-35 -20,-30 C-25,-27 -28,-24 -30,-20 Z" 
          fill="#2563EB" opacity="0.8"/>
    <path d="M-15,-15 C-20,-5 -20,5 -15,15 C-10,20 0,25 10,20 C15,15 18,5 18,0 C18,-5 15,-15 10,-18 C5,-20 -5,-20 -10,-18 C-12,-17 -14,-16 -15,-15 Z" 
          fill="#7C3AED" opacity="0.6"/>
    <circle cx="-25" cy="-25" r="5" fill="#F59E0B"/>
    <circle cx="25" cy="-25" r="5" fill="#F59E0B"/>
    <circle cx="0" cy="-40" r="8" fill="#F59E0B"/>
  </g>
  
  <!-- App Name -->
  <text x="540" y="450" font-family="Georgia, serif" font-size="48" fill="#FFFFFF" text-anchor="middle" font-weight="bold">AI Language Coach</text>
  
  <!-- Tagline -->
  <text x="540" y="520" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle" opacity="0.9">Your Personal AI Language Coach</text>
  
  <!-- Feature Icons -->
  <g transform="translate(540, 650)">
    <g transform="translate(-200, 0)">
      <circle cx="0" cy="0" r="30" fill="#FFFFFF" opacity="0.2"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">🎯</text>
    </g>
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="30" fill="#FFFFFF" opacity="0.2"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">⚡</text>
    </g>
    <g transform="translate(200, 0)">
      <circle cx="0" cy="0" r="30" fill="#FFFFFF" opacity="0.2"/>
      <text x="0" y="8" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">🌍</text>
    </g>
  </g>
  
  <!-- Call to Action -->
  <g transform="translate(540, 780)">
    <rect x="-180" y="-30" width="360" height="60" rx="30" fill="#F59E0B" opacity="0.9"/>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Download Free</text>
  </g>
  
  <!-- Brand Elements -->
  <g transform="translate(540, 900)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" opacity="0.7">@ailanguagecoach</text>
  </g>
  
  <!-- Corner Branding -->
  <g transform="translate(150, 150)">
    <rect x="-20" y="-20" width="40" height="40" rx="8" fill="#FFFFFF" opacity="0.2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" opacity="0.7">AI</text>
  </g>
</svg>