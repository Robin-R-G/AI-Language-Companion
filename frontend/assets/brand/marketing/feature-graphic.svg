<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="featureGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#featureGradient)"/>
  
  <!-- Decorative Pattern -->
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#FFFFFF" opacity="0.1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#dots)"/>
  
  <!-- Brain + Globe Icon -->
  <g transform="translate(512, 200)" filter="url(#glow)">
    <!-- Globe -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="40" ry="80" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    
    <!-- Brain -->
    <path d="M-30,-40 C-40,-30 -45,-10 -40,10 C-35,30 -20,40 0,40 C20,40 35,30 40,10 C45,-10 40,-30 30,-40" 
          fill="#FFFFFF" opacity="0.9" stroke="#FFFFFF" stroke-width="1"/>
    <path d="M-20,-30 C-25,-20 -25,0 -20,20 C-15,30 -5,35 0,35" 
          fill="none" stroke="#2563EB" stroke-width="2" opacity="0.7"/>
    <path d="M20,-30 C25,-20 25,0 20,20 C15,30 5,35 0,35" 
          fill="none" stroke="#2563EB" stroke-width="2" opacity="0.7"/>
    
    <!-- AI Sparkles -->
    <circle cx="-50" cy="-50" r="3" fill="#F59E0B"/>
    <circle cx="50" cy="-50" r="3" fill="#F59E0B"/>
    <circle cx="-50" cy="50" r="3" fill="#F59E0B"/>
    <circle cx="50" cy="50" r="3" fill="#F59E0B"/>
  </g>
  
  <!-- App Name -->
  <text x="512" y="330" font-family="Georgia, serif" font-size="42" fill="#FFFFFF" text-anchor="middle" font-weight="bold">AI Language Coach</text>
  
  <!-- Tagline -->
  <text x="512" y="380" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle" opacity="0.9">Your Personal AI Language Coach</text>
  
  <!-- Feature Highlights -->
  <g transform="translate(512, 440)">
    <text x="-200" y="0" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" opacity="0.8">✓ Personalized Learning</text>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" opacity="0.8">✓ Real-time Feedback</text>
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" opacity="0.8">✓ 50+ Languages</text>
  </g>
  
  <!-- Brand Logo Placeholder -->
  <g transform="translate(100, 100)">
    <rect x="-20" y="-20" width="40" height="40" rx="8" fill="#FFFFFF" opacity="0.2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.7">LOGO</text>
  </g>
</svg>