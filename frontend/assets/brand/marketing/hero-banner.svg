<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#heroGradient)"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="150" fill="#FFFFFF" opacity="0.05"/>
  <circle cx="1100" cy="500" r="200" fill="#FFFFFF" opacity="0.05"/>
  <circle cx="600" cy="300" r="300" fill="#FFFFFF" opacity="0.03"/>
  
  <!-- AI Coach Character (Stylized) -->
  <g transform="translate(300, 300)" filter="url(#shadow)">
    <!-- Body -->
    <ellipse cx="0" cy="50" rx="40" ry="60" fill="#FFFFFF" opacity="0.9"/>
    <!-- Head -->
    <circle cx="0" cy="-20" r="35" fill="#FFFFFF" opacity="0.9"/>
    <!-- Face Features -->
    <circle cx="-10" cy="-25" r="4" fill="#2563EB"/>
    <circle cx="10" cy="-25" r="4" fill="#2563EB"/>
    <path d="M-10,-10 Q0,-5 10,-10" stroke="#2563EB" stroke-width="2" fill="none"/>
    <!-- AI Indicator -->
    <circle cx="0" cy="-55" r="8" fill="#F59E0B"/>
    <text x="0" y="-52" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle" font-weight="bold">AI</text>
    <!-- Speech Bubble -->
    <rect x="50" y="-60" width="80" height="40" rx="10" fill="#FFFFFF" opacity="0.9"/>
    <text x="90" y="-35" font-family="Arial, sans-serif" font-size="10" fill="#2563EB" text-anchor="middle">Hola!</text>
  </g>
  
  <!-- Phone Mockup -->
  <g transform="translate(800, 200)" filter="url(#shadow)">
    <!-- Phone Frame -->
    <rect x="-70" y="-120" width="140" height="240" rx="15" fill="#1E293B" stroke="#475569" stroke-width="2"/>
    <!-- Screen -->
    <rect x="-60" y="-105" width="120" height="210" rx="10" fill="url(#phoneGradient)"/>
    <!-- Screen Content -->
    <text x="0" y="-70" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle" opacity="0.8">AI Language Coach</text>
    <rect x="-40" y="-50" width="80" height="30" rx="5" fill="#FFFFFF" opacity="0.2"/>
    <text x="0" y="-30" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle" opacity="0.6">[Chat Interface]</text>
    <rect x="-40" y="0" width="80" height="20" rx="5" fill="#F59E0B" opacity="0.8"/>
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="7" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Start Learning</text>
    <!-- Phone Button -->
    <circle cx="0" cy="95" r="8" fill="#475569" stroke="#64748B" stroke-width="1"/>
  </g>
  
  <!-- Tagline -->
  <g transform="translate(600, 450)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="48" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Learn Any Language</text>
    <text x="0" y="50" font-family="Georgia, serif" font-size="48" fill="#FFFFFF" text-anchor="middle" font-weight="bold">with AI</text>
    <text x="0" y="90" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" opacity="0.8">Personalized coaching powered by artificial intelligence</text>
  </g>
  
  <!-- Call to Action -->
  <g transform="translate(600, 550)">
    <rect x="-120" y="-20" width="240" height="40" rx="20" fill="#FFFFFF" opacity="0.9"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="16" fill="#2563EB" text-anchor="middle" font-weight="bold">Get Started Free</text>
  </g>
  
  <!-- Brand Elements -->
  <g transform="translate(100, 500)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.7">AI Language Coach</text>
  </g>
</svg>