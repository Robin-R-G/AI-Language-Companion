<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="heroAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#heroBg)"/>
  
  <!-- Decorative grid -->
  <circle cx="400" cy="540" r="500" stroke="#2563EB" stroke-width="0.5" opacity="0.05"/>
  <circle cx="400" cy="540" r="350" stroke="#7C3AED" stroke-width="0.5" opacity="0.04"/>
  <circle cx="400" cy="540" r="200" stroke="#06B6D4" stroke-width="0.5" opacity="0.03"/>
  
  <!-- Left text content -->
  <g transform="translate(120, 280)">
    <rect x="0" y="0" width="700" height="500">
      <title>Text content area</title>
    </rect>
    
    <!-- Badge -->
    <rect x="0" y="0" width="160" height="32" rx="16" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="1"/>
    <text x="80" y="21" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#60A5FA" text-anchor="middle">AI-POWERED COACH</text>
    
    <!-- Headline -->
    <text x="0" y="80" font-family="Inter, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Master Any</text>
    <text x="0" y="155" font-family="Inter, sans-serif" font-size="64" font-weight="700" fill="url(#heroAccent)" letter-spacing="-1">Language</text>
    <text x="0" y="230" font-family="Inter, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF" letter-spacing="-1">With AI</text>
    
    <!-- Subtitle -->
    <text x="0" y="290" font-family="Inter, sans-serif" font-size="20" fill="#94A3B8">Personalized voice conversations, real-time corrections,</text>
    <text x="0" y="318" font-family="Inter, sans-serif" font-size="20" fill="#94A3B8">and adaptive exam preparation for 12+ languages.</text>
    
    <!-- CTA buttons -->
    <rect x="0" y="370" width="220" height="56" rx="12" fill="#2563EB"/>
    <text x="110" y="404" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">Start Free Trial</text>
    <rect x="240" y="370" width="180" height="56" rx="12" fill="none" stroke="#475569" stroke-width="1.5"/>
    <text x="330" y="404" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#94A3B8" text-anchor="middle">Watch Demo</text>
    
    <!-- Trust signals -->
    <g transform="translate(0, 460)">
      <circle cx="8" cy="8" r="8" fill="#22C55E" opacity="0.2"/>
      <text x="24" y="12" font-family="Inter, sans-serif" font-size="13" fill="#94A3B8">IELTS, TOEFL, Goethe, JLPT &amp; more</text>
      <circle cx="340" cy="8" r="8" fill="#22C55E" opacity="0.2"/>
      <text x="356" y="12" font-family="Inter, sans-serif" font-size="13" fill="#94A3B8">50,000+ learners worldwide</text>
    </g>
  </g>
  
  <!-- Right side — Phone mockups -->
  <g transform="translate(920, 140)">
    <!-- Main phone -->
    <g transform="translate(100, 0)">
      <rect width="280" height="560" rx="32" fill="#1E293B" stroke="#475569" stroke-width="2"/>
      <rect x="12" y="12" width="256" height="536" rx="26" fill="#F8FAFC"/>
      <!-- App content -->
      <rect x="24" y="24" width="232" height="40" rx="10" fill="url(#heroAccent)"/>
      <text x="140" y="48" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Daily Mission</text>
      <!-- Voice wave -->
      <g transform="translate(44, 80)">
        <rect x="0" y="8" width="8" height="24" rx="4" fill="#2563EB"/>
        <rect x="14" y="0" width="8" height="40" rx="4" fill="#7C3AED"/>
        <rect x="28" y="6" width="8" height="28" rx="4" fill="#06B6D4"/>
        <rect x="42" y="2" width="8" height="36" rx="4" fill="#22C55E"/>
        <rect x="56" y="10" width="8" height="20" rx="4" fill="#F59E0B"/>
        <rect x="70" y="4" width="8" height="32" rx="4" fill="#2563EB"/>
        <rect x="84" y="8" width="8" height="24" rx="4" fill="#EC4899"/>
        <rect x="98" y="0" width="8" height="40" rx="4" fill="#7C3AED"/>
        <rect x="112" y="6" width="8" height="28" rx="4" fill="#14B8A6"/>
        <rect x="126" y="12" width="8" height="16" rx="4" fill="#22C55E"/>
        <rect x="140" y="2" width="8" height="36" rx="4" fill="#2563EB"/>
        <rect x="154" y="8" width="8" height="24" rx="4" fill="#F59E0B"/>
        <rect x="168" y="4" width="8" height="32" rx="4" fill="#7C3AED"/>
      </g>
      <!-- Chat -->
      <rect x="24" y="140" width="180" height="36" rx="10" fill="#F1F5F9"/>
      <rect x="76" y="188" width="180" height="36" rx="10" fill="#2563EB"/>
      <rect x="24" y="236" width="160" height="36" rx="10" fill="#F1F5F9"/>
      <!-- Stats -->
      <rect x="24" y="290" width="108" height="70" rx="10" fill="#EFF6FF"/>
      <text x="78" y="318" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#2563EB" text-anchor="middle">7.5</text>
      <text x="78" y="338" font-family="Inter, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">IELTS Band</text>
      <rect x="148" y="290" width="108" height="70" rx="10" fill="#F0FDF4"/>
      <text x="202" y="318" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#22C55E" text-anchor="middle">15</text>
      <text x="202" y="338" font-family="Inter, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">XP Today</text>
    </g>
    
    <!-- Secondary phone (offset) -->
    <g transform="translate(320, 60)" opacity="0.6">
      <rect width="240" height="480" rx="28" fill="#1E293B" stroke="#475569" stroke-width="1.5"/>
      <rect x="10" y="10" width="220" height="460" rx="24" fill="#F8FAFC"/>
      <rect x="20" y="20" width="200" height="32" rx="8" fill="#7C3AED"/>
      <text x="120" y="40" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Vocabulary Review</text>
      <rect x="20" y="64" width="200" height="100" rx="8" fill="#F1F5F9"/>
      <rect x="20" y="176" width="200" height="80" rx="8" fill="#F1F5F9"/>
      <rect x="20" y="268" width="200" height="60" rx="8" fill="#F0FDF4"/>
    </g>
  </g>
  
  <!-- Language badges floating -->
  <g transform="translate(150, 60)" opacity="0.8">
    <rect width="80" height="32" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="40" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#F8FAFC" text-anchor="middle">English</text>
  </g>
  <g transform="translate(260, 30)" opacity="0.7">
    <rect width="80" height="32" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="40" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#F8FAFC" text-anchor="middle">German</text>
  </g>
  <g transform="translate(370, 70)" opacity="0.6">
    <rect width="80" height="32" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="40" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#F8FAFC" text-anchor="middle">Japanese</text>
  </g>
  <g transform="translate(480, 40)" opacity="0.5">
    <rect width="80" height="32" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="40" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#F8FAFC" text-anchor="middle">French</text>
  </g>
</svg>
