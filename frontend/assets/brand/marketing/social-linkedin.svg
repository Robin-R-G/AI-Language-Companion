<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="linkedinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#linkedinGradient)"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="200" fill="#FFFFFF" opacity="0.05"/>
  <circle cx="1100" cy="527" r="250" fill="#FFFFFF" opacity="0.05"/>
  
  <!-- Content Card -->
  <rect x="50" y="50" width="1100" height="527" rx="20" fill="url(#cardGradient)" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  
  <!-- Header -->
  <g transform="translate(600, 120)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="36" fill="#FFFFFF" text-anchor="middle" font-weight="bold">AI Language Coach</text>
    <line x1="-100" y1="15" x2="100" y2="15" stroke="#F59E0B" stroke-width="2"/>
  </g>
  
  <!-- Main Content -->
  <g transform="translate(600, 250)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">Transform Your Language Learning</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" opacity="0.9">with AI-Powered Personalized Coaching</text>
  </g>
  
  <!-- Features -->
  <g transform="translate(600, 380)">
    <text x="-250" y="0" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" opacity="0.8">🎯 Personalized Lessons</text>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" opacity="0.8">⚡ Real-time Feedback</text>
    <text x="250" y="0" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" opacity="0.8">🌍 50+ Languages</text>
  </g>
  
  <!-- Call to Action -->
  <g transform="translate(600, 480)">
    <rect x="-150" y="-25" width="300" height="50" rx="25" fill="#FFFFFF" opacity="0.9"/>
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="18" fill="#2563EB" text-anchor="middle" font-weight="bold">Start Learning Today</text>
  </g>
  
  <!-- Brand Footer -->
  <g transform="translate(600, 560)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" opacity="0.7">www.ailanguagecoach.com</text>
  </g>
  
  <!-- LinkedIn Logo Placeholder -->
  <g transform="translate(1100, 100)">
    <rect x="-15" y="-15" width="30" height="30" rx="4" fill="#FFFFFF" opacity="0.2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.7">in</text>
  </g>
</svg>