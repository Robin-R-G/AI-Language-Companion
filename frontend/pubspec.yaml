name: ai_language_coach
description: "AI-powered language learning application for exam preparation and fluency."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Environment
  flutter_dotenv: ^5.2.1

  # Supabase
  supabase_flutter: ^2.8.4

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Data Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  confetti: ^0.7.0
  fl_chart: ^0.70.2
  image_picker: ^1.1.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  dartz: ^0.10.1
  connectivity_plus: ^7.2.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_analytics: ^11.4.1
  firebase_crashlytics: ^4.3.1
  firebase_messaging: ^15.2.1

  # Voice
  livekit_client: ^2.8.1

  # Payments
  purchases_flutter: ^8.1.4

  # Ads
  google_mobile_ads: ^5.2.0

  # Animations
  lottie: ^3.2.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Permissions
  permission_handler: ^11.3.1

  # Device Info
  device_info_plus: ^12.3.0

  # URL Launcher
  url_launcher: ^6.3.1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0

  # Payments — Razorpay (India)
  razorpay_flutter: ^1.3.7

  # Payments — Stripe (International)
  flutter_stripe: ^11.3.0

  # Offline Storage
  sqflite: ^2.4.2
  path_provider: ^2.1.5

  # Networking & Media
  cached_network_image: ^3.4.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Error Monitoring
  sentry_flutter: ^8.14.2

  # PDF Generation (certificates, invoices)
  pdf: ^3.11.3
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

  # Testing
  mocktail: ^1.0.4

  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env

    # Legacy asset dirs
    - assets/icons/
    - assets/illustrations/
    - assets/animations/

    # Brand assets — Logo
    - assets/brand/logo/svg/
    - assets/brand/logo/png/

    # Brand assets — Splash
    - assets/brand/splash/svg/
    - assets/brand/splash/png/

    # Brand assets — Onboarding
    - assets/brand/onboarding/svg/
    - assets/brand/onboarding/png/

    # Brand assets — Empty States
    - assets/brand/empty-states/svg/
    - assets/brand/empty-states/png/

    # Brand assets — Achievement Badges
    - assets/brand/badges/svg/
    - assets/brand/badges/png/

    # Brand assets — XP Level Icons
    - assets/brand/xp-levels/svg/
    - assets/brand/xp-levels/png/

    # Brand assets — Avatars
    - assets/brand/avatars/svg/
    - assets/brand/avatars/png/

    # Brand assets — AI Assistant
    - assets/brand/ai-assistant/svg/
    - assets/brand/ai-assistant/png/

    # Brand assets — Exam Icons
    - assets/brand/exam-icons/svg/
    - assets/brand/exam-icons/png/

    # Brand assets — Language Icons
    - assets/brand/language-icons/svg/
    - assets/brand/language-icons/png/

    # Brand assets — Category Icons
    - assets/brand/category-icons/svg/
    - assets/brand/category-icons/png/

    # Brand assets — Notification Icons
    - assets/brand/notification-icons/svg/
    - assets/brand/notification-icons/png/

    # Brand assets — Certificates
    - assets/brand/certificates/svg/
    - assets/brand/certificates/png/

    # Brand assets — Marketing
    - assets/brand/marketing/svg/
    - assets/brand/marketing/png/

    # Brand assets — Mascot
    - assets/brand/mascot/svg/
    - assets/brand/mascot/png/

    # Brand assets — Animations (Lottie JSON)
    - assets/brand/animations/loading.json
    - assets/brand/animations/typing.json
    - assets/brand/animations/ai-thinking.json
    - assets/brand/animations/listening.json
    - assets/brand/animations/speaking.json
    - assets/brand/animations/voice-wave.json
    - assets/brand/animations/lesson-complete.json
    - assets/brand/animations/badge-unlock.json
    - assets/brand/animations/xp-increase.json
    - assets/brand/animations/correct-answer.json
    - assets/brand/animations/wrong-answer.json
    - assets/brand/animations/streak-fire.json
    - assets/brand/animations/voice-wave-idle.json
    - assets/brand/animations/voice-wave-listening.json
    - assets/brand/animations/lottie/confetti.json
    - assets/brand/animations/lottie/loading.json
    - assets/brand/animations/lottie/ai_thinking.json
    - assets/brand/animations/lottie/badge_unlock.json
    - assets/brand/animations/lottie/correct_answer.json
    - assets/brand/animations/lottie/lesson_complete.json
    - assets/brand/animations/lottie/listening.json
    - assets/brand/animations/lottie/speaking.json
    - assets/brand/animations/lottie/streak_fire.json
    - assets/brand/animations/lottie/typing.json
    - assets/brand/animations/lottie/voice_wave.json
    - assets/brand/animations/lottie/wrong_answer.json
    - assets/brand/animations/lottie/xp_increase.json
    - assets/brand/animations/voice-wave/voice_wave_idle.json
    - assets/brand/animations/voice-wave/voice_wave_listening.json
    - assets/brand/animations/voice-wave/voice_wave_speaking.json
    - assets/brand/animations/voice-wave/voice_wave_ai_response.json
    - assets/brand/animations/voice-wave/voice_wave_recording.json
    - assets/brand/animations/voice-wave/voice_wave_processing.json
    - assets/brand/animations/voice-wave/voice_wave_dark_mode.json
    - assets/brand/animations/voice-wave/voice_wave_light_mode.json

    # Brand assets — Sounds (UI SFX)
    - assets/brand/sounds/button_tap.wav
    - assets/brand/sounds/success.wav
    - assets/brand/sounds/error.wav
    - assets/brand/sounds/badge_unlock.wav
    - assets/brand/sounds/xp_gain.wav
    - assets/brand/sounds/streak_fire.wav
    - assets/brand/sounds/lesson_complete.wav
    - assets/brand/sounds/notification.wav
    - assets/brand/sounds/voice_start.wav
    - assets/brand/sounds/voice_stop.wav
    - assets/brand/sounds/mic_enabled.wav

    # Brand assets — Design Tokens
    - assets/brand/design-tokens/tokens.json
    - assets/brand/design-tokens/tokens.css

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/brand/logo/png/logo-icon.png"
  adaptive_icon_background: "#1E1E1E"
  adaptive_icon_foreground: "assets/brand/logo/png/logo-icon.png"

flutter_native_splash:
  color: "#1E1E1E"
  image: "assets/brand/splash/png/splash_illustration.png"
  android_12:
    image: "assets/brand/logo/png/logo-icon.png"
    color: "#1E1E1E"
