name: Coverage Report

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  WORK_DIR: frontend

jobs:
  coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORK_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage --coverage-path=coverage/lcov.info

      - name: Check minimum coverage
        run: |
          if [ -f coverage/lcov.info ]; then
            linesFound=$(grep -c "^SF:" coverage/lcov.info || true)
            linesHit=$(grep -c "^DA:.*,1$" coverage/lcov.info || true)
            if [ "$linesFound" -gt 0 ]; then
              pct=$(echo "scale=2; $linesHit * 100 / $linesFound" | bc)
              echo "Coverage: $pct%"
              if [ $(echo "$pct < 70" | bc) -eq 1 ]; then
                echo "::warning::Coverage $pct% is below 70% threshold"
              fi
            fi
          else
            echo "No coverage file found"
          fi

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-coverage-report
          path: ${{ env.WORK_DIR }}/coverage/
          retention-days: 90
